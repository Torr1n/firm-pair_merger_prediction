# Firm-Pair Merger Prediction Pipeline Configuration
# Training window: 2020 patent data

# --- Embedding ---
embedding:
  model_name: "AI-Growth-Lab/PatentSBERTa"
  output_dim: 768
  max_token_length: 512
  batch_size: 256           # GPU batch size (reduce to 64 for CPU)
  checkpoint_every_n: 100000  # Save checkpoint every N patents

# --- Citation Aggregation ---
citation_aggregation:
  method: "mean_pooling"    # Options: mean_pooling (others TBD via ADR-002)
  zero_citation_strategy: "zero_vector"  # Patents with no citations get 768D zero vector

# --- Dimensionality Reduction ---
umap:
  n_components: 50
  n_neighbors: 15
  min_dist: 0.1
  metric: "cosine"
  random_state: 42

# --- Data Paths (v3: tech + biotech, clean scope, post_deal_flag, pre-deduped) ---
data:
  patent_metadata: "data/firm_patents_text_metadata_techbio_v3.parquet"
  patent_metadata_dedup: "data/firm_patents_dedup_techbio_v3.parquet"
  cited_abstracts: "data/cited_abstracts_techbio_v3.parquet"
  citation_network: "data/citation_network_techbio_v3.parquet"

# --- Portfolio Construction (Week 2) ---
portfolio:
  min_patents: 5                    # Firms below this are excluded (ADR-005)
  single_gaussian_max: 49           # Firms with min_patents..this get K=1 (ADR-005)
  gmm_method: "bayesian"            # "bayesian" or "bic_sweep" (ADR-004)
  k_max: 15                         # Production locked (ADR-004, 2026-04-14): converged at K=10, K=15 for mega-firm headroom
  k_max_reference: 10               # Convergence-floor reference artifact; available for robustness checks
  k_max_sweep: [10, 15, 20, 25, 30] # Values used in the K_max convergence sweep (reproducibility)
  dedup_decisions_path: "output/kmax_sweep/deduplication_decisions.csv"
  covariance_type: "diag"           # "diag" per ADR-006
  normalization: "raw"              # "raw", "l2", or "zscore" (ADR-007, finalized via EDA)
  weight_pruning_threshold: 0.01    # Components below this weight are pruned
  weight_concentration_prior: 1.0   # Dirichlet process γ — E[K]≈γ·log(n) (ADR-004, post-audit)
  mean_precision_prior: 1.0         # κ₀: weakly informative mean shrinkage
  degrees_of_freedom_prior: 52      # ν₀ = d+2 for finite posterior mean (audit recommendation)
  random_state: 42
  max_iter: 200
  n_init: 5                         # Best of N initializations (up from 3 for VI stability)
  checkpoint_every_n: 1000          # Save progress every N firms

# --- Output Paths ---
output:
  checkpoint_dir: "output/embeddings"
  title_abstract_embeddings: "output/embeddings/title_abstract_embeddings.parquet"
  citation_embeddings: "output/embeddings/citation_embeddings.parquet"
  concatenated_vectors: "output/embeddings/concatenated_1536d.parquet"
  patent_vectors_50d: "output/embeddings/patent_vectors_50d.parquet"
  gvkey_map: "output/embeddings/gvkey_map.parquet"

output_portfolios:
  checkpoint_dir: "output/portfolios"
  firm_gmm_parameters_template: "output/portfolios/firm_gmm_parameters_k{k_max}.parquet"  # production: k15
  firm_gmm_parameters_reference: "output/portfolios/firm_gmm_parameters_k10.parquet"      # convergence-floor reference
  excluded_firms_log: "output/portfolios/excluded_firms.csv"

# --- Comparison (Week 3) ---
# Consumed by BhattacharyyaComputer (see docs/specs/comparison_spec.md).
# Spec status: Reviewed — revisions in progress (Codex 2026-04-14); NOT yet approved
# for implementation. This section is seeded now so the config contract is ready when
# Codex's second review pass clears.
comparison:
  output_dir: "output/comparison"
  bc_matrix_template: "output/comparison/bc_matrix_k{k_max}.npz"
  sg_block_cache: true                  # Precompute and reuse the SG-vs-SG block (≈85% of firms are SG)
  sg_block_chunk_size: 200              # Chunk size for SG block computation (memory mgmt)
